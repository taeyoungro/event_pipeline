name: Deploy IAM Pipeline to EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 레포지토리 최신 코드 가져오기
        uses: actions/checkout@v3

      - name: 2. EC2로 코드 전송하기 (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }} # ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/ec2-user/iam_pipeline"
          # .git 폴더나 github workflow 파일 자체는 서버에 전송하지 않도록 제외합니다.
          strip_components: 0
          rm: false 

      - name: 3. 환경변수(.env) 생성 및 서비스 재시작 (SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. 작업 디렉토리로 이동
            cd /home/ec2-user/iam_pipeline
            
            # 2. GitHub Secrets에 저장된 내용으로 .env 파일 생성
            echo "${{ secrets.ENV_FILE }}" > .env
            
            # 3. 중요 보안 조치: 소유자(ec2-user)만 읽고 쓸 수 있도록 권한 강제 설정
            chmod 600 .env
            
            # 4. 이전 git add 목록에서 확인된 systemd 서비스 재시작 (예시)
            # 서버에 iam-pipeline.service가 등록되어 있다고 가정하고 재시작합니다.
            sudo systemctl daemon-reload
            sudo systemctl restart iam-pipeline.service
            
            echo "✅ 모든 코드 배포 및 .env 주입이 안전하게 완료되었습니다!"